name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build iOS App
      run: |
        cd solitaireslasher/export
        xcodebuild archive \
          -project solitaireslasher.xcodeproj \
          -scheme solitaireslasher \
          -destination generic/platform=iOS \
          -archivePath build.xcarchive \
          CODE_SIGN_IDENTITY="Apple Development" \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=A799KC8Q79 \
          COMPILER_INDEX_STORE_ENABLE=NO
          
    - name: Export IPA
      run: |
        cd solitaireslasher/export
        xcodebuild -exportArchive \
          -archivePath build.xcarchive \
          -exportPath export \
          -exportOptionsPlist ExportOptions.plist
          
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ios-app
        path: solitaireslasher/export/export/*.ipa
